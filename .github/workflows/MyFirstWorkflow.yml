name: My First Workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    
    - uses: actions/checkout@v4
    - name: Docker Login
      uses: docker/login-action@v4
      with:
        username: pooja029
        password: ${{ secrets.MY_DOCKER_PASSWORD }}
    - name: Build the Docker image
      run: docker build -t pooja029/hello-world:latest .
    - name: Push the Image
      run: docker push pooja029/hello-world:latest
